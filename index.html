<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso Sistema</title>

<style>
body{
margin:0;
font-family:Segoe UI,Arial;
background:#f2f5f8;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

/* CAJA LOGIN */

.login-box{
background:white;
padding:40px;
border-radius:6px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
width:320px;
text-align:center;
}

.header{
background:#0078c8;
color:white;
padding:15px;
font-weight:600;
margin:-40px -40px 30px -40px;
border-radius:6px 6px 0 0;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#0078c8;
border:none;
color:white;
font-weight:600;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#005a9e;
}

#error{
color:red;
margin-top:10px;
font-size:14px;
}
</style>

</head>

<body>

<div class="login-box">

<div class="header">
Sistema Operativo
</div>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Iniciar sesión</button>

<div id="error"></div>

</div>

<script>

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="Stefianos" && p==="Stef3123"){

window.location="menu.html";

}else{

document.getElementById("error").innerText="Usuario o contraseña incorrectos";

}

}

</script>

</body>
</html>
