<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INLET</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#005baa;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.btn{
background:#005baa;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn:hover{
background:#004080;
}

.fileLabel{
background:#e9eef5;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
display:inline-block;
margin-top:10px;
}

input[type=file]{
display:none;
}

.status{
margin-top:10px;
margin-bottom:20px;
color:#555;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

th{
background:#005baa;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.green{background:#d9f2e3;}
.orange{background:#fff2cc;}
.red{background:#ffd6d6;}

</style>

</head>

<body>

<div class="header">
INLET
</div>

<div class="container">

<a href="../menu.html">
<button class="btn">⬅ Volver al menú</button>
</a>

<br><br>

<label class="fileLabel" for="fileMaster">📁 Subir archivo maestro</label>
<input id="fileMaster" type="file">

<div id="statusMaster" class="status"></div>

<label class="fileLabel" for="fileDaily">📄 Subir archivo diario</label>
<input id="fileDaily" type="file">

<div id="statusDaily" class="status"></div>

<button id="processBtn" class="btn" style="display:none;">⚙️ Procesar datos</button>

<div id="resultsContainer"></div>

</div>

<script>

const fileMaster=document.getElementById("fileMaster");
const fileDaily=document.getElementById("fileDaily");

const statusMaster=document.getElementById("statusMaster");
const statusDaily=document.getElementById("statusDaily");

const processBtn=document.getElementById("processBtn");
const resultsContainer=document.getElementById("resultsContainer");

let masterFile=null;
let dailyFile=null;

fileMaster.addEventListener("change",e=>{
masterFile=e.target.files[0];
statusMaster.textContent="Archivo cargado: "+masterFile.name;
check();
});

fileDaily.addEventListener("change",e=>{
dailyFile=e.target.files[0];
statusDaily.textContent="Archivo cargado: "+dailyFile.name;
check();
});

function check(){
if(masterFile && dailyFile){
processBtn.style.display="inline-block";
}
}

processBtn.addEventListener("click",async ()=>{

const masterRows=await readXLSX(masterFile);
const dailyRows=await readXLSX(dailyFile);

render(dailyRows);

});

async function readXLSX(file){

const data=await file.arrayBuffer();

const workbook=XLSX.read(data,{type:"array"});

const sheet=workbook.Sheets[workbook.SheetNames[0]];

return XLSX.utils.sheet_to_json(sheet,{header:1});

}

function render(rows){

let html="<table><tr><th>Destinatario</th><th>Población</th><th>Palets</th></tr>";

rows.forEach(r=>{

html+=`<tr>
<td>${r[0]||""}</td>
<td>${r[1]||""}</td>
<td>${r[2]||""}</td>
</tr>`;

});

resultsContainer.innerHTML=html+"</table>";

}

</script>

</body>
</html>
